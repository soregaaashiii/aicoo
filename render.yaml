services:
  - type: web
    name: aicoo-lab-lp
    runtime: ruby
    plan: free
    buildCommand: bundle install && SECRET_KEY_BASE_DUMMY=1 bin/rails assets:precompile
    startCommand: bin/rails db:migrate && bin/rails server -b 0.0.0.0 -p $PORT
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY_BASE
        sync: false
      - key: AICOO_PUBLIC_BASE_URL
        sync: false
      - key: AICOO_BASIC_AUTH_USERNAME
        sync: false
      - key: AICOO_BASIC_AUTH_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
